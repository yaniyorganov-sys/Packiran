<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تست OpenRouter</title>
<style>
  body {
    font-family: Tahoma, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 0 20px;
    background: #f5f5f7;
  }
  h2 { text-align: center; }
  textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    resize: vertical;
  }
  button {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  #result {
    margin-top: 20px;
    padding: 15px;
    background: white;
    border-radius: 8px;
    min-height: 40px;
    white-space: pre-wrap;
    line-height: 1.8;
  }
  .status { color: #6b7280; font-size: 14px; }
</style>
</head>
<body>

<h2>تست ساده OpenRouter</h2>
<textarea id="userInput" placeholder="پیامت رو اینجا بنویس..."></textarea><br>
<button id="sendBtn" onclick="sendMessage()">ارسال</button>
<div id="result" class="status">جواب اینجا نمایش داده می‌شه...</div>

<script>
const API_KEY = "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";

async function sendMessage() {
  const input = document.getElementById('userInput').value.trim();
  const resultDiv = document.getElementById('result');
  const btn = document.getElementById('sendBtn');

  if (!input) {
    resultDiv.textContent = "یه پیام بنویس اول!";
    return;
  }

  btn.disabled = true;
  resultDiv.textContent = "در حال دریافت جواب...";
  resultDiv.className = "status";

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY,
      },
      body: JSON.stringify({
        model: "meta-llama/llama-3.3-70b-instruct:free",
        messages: [
          { role: "user", content: input }
        ]
      })
    });

    const data = await response.json();

    if (data.error) {
      resultDiv.textContent = "خطا: " + data.error.message;
    } else {
      resultDiv.textContent = data.choices[0].message.content;
      resultDiv.className = "";
    }
  } catch (err) {
    resultDiv.textContent = "خطا در ارتباط: " + err.message;
  }

  btn.disabled = false;
}
</script>

</body>
</html>
